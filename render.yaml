services:
  - type: web
    name: devfood-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_SYNCHRONIZE
        value: "true"          # mantenha "true" no primeiro deploy; troque para "false" depois
      - key: DATABASE_URL
        fromDatabase:
          name: devfood-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true    # Render gera automaticamente
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://seu-projeto.vercel.app   # atualize após deploy do frontend

databases:
  - name: devfood-db
    plan: free
    databaseName: devfood_db
    user: devfood
